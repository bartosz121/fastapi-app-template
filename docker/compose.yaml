services:
  postgres:
    image: postgres:18-alpine
    container_name: todo-api-postgres
    environment:
      POSTGRES_USER: todo_api
      POSTGRES_PASSWORD: todo_api
      POSTGRES_DB: todo_api
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U todo_api -d todo_api"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  todo-api:
    build:
      context: ..
      dockerfile: Dockerfile
    image: todo-api:latest
    container_name: todo-api
    command:
      - granian
      - --loop
      - uvloop
      - --interface
      - asgi
      - --log-level
      - info
      - --access-log
      - --workers
      - "1"
      - --factory
      - todo_api.main:create_app
      - --host
      - 0.0.0.0
      - --port
      - "8000"
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      ENVIRONMENT: PRODUCTION
      LOG_LEVEL: INFO
      ENABLED_LOGGERS: '["granian","sqlalchemy","opentelemetry"]'
      APP_NAME: todo-api
      OTEL_ENABLED: "true"
      OTLP_GRPC_ENDPOINT: "localhost:4317"
      OTLP_EXPORTER_INSECURE: "true"
      SECRET: "secret"
      USER_SESSION_TTL: "744"
      AUTH_COOKIE_NAME: todo_auth
      AUTH_COOKIE_DOMAIN: localhost
      JWT_EXPIRATION: "259200"
      PROMETHEUS_MULTIPROC_DIR: /tmp/prometheus
      DB_HOST: postgres
      DB_PORT: "5432"
      DB_DATABASE: todo_api
      DB_USER: todo_api
      DB_PASSWORD: todo_api
    volumes:
      - /tmp/prometheus:/tmp/prometheus
    restart: unless-stopped
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')",
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

volumes:
  postgres_data:
